CONFIG_ZMK_KEYBOARD_NAME="Velociraptor36"

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_POINTING=y

CONFIG_ZMK_COMBO_MAX_COMBO_COUNT=10

# Enable these after setting chain-length in boards/nice_nano_v2.overlay.
# The Velociraptor36 RGB status module then defaults on:
# - power on: white flash
# - paired/connected: cyan flash
# - BLE profile 0/1/2 selected: red/green/blue flash
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
