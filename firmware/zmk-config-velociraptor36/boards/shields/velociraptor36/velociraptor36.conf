CONFIG_ZMK_KEYBOARD_NAME="Velociraptor36"

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_POINTING=y

CONFIG_ZMK_COMBO_MAX_COMBO_COUNT=10

# RGB underglow bring-up. Keep the custom status flasher disabled until
# stock underglow is confirmed on both halves.
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=80
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_VELOCIRAPTOR36_RGB_STATUS=n
